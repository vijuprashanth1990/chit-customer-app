name: Deploy chit-customer-app Web to GitHub Pages

on:
  push:
    branches:
      - main   # deploy whenever you push to main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v3

      # Install Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'   # use your Flutter version

      # Build Flutter web
      - name: Build Web
        run: flutter build web --release --base-href=/chit-customer-app/

      # Deploy to GitHub Pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
